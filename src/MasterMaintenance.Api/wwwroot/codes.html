<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マスタメンテナンス - コードマスタ</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- ===== Header ===== -->
  <nav class="navbar navbar-expand navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <button class="btn btn-dark me-2" id="sidebarToggle">
        <i class="bi bi-list"></i>
      </button>
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-gear-fill me-1"></i>マスタメンテナンス
      </a>
      <div class="ms-auto d-flex align-items-center">
        <span class="text-light small me-2" id="currentUserName">
          <i class="bi bi-person-circle me-1"></i>
        </span>
        <a href="#" class="btn btn-outline-light btn-sm" id="btnLogout">
          <i class="bi bi-box-arrow-right"></i> ログアウト
        </a>
      </div>
    </div>
  </nav>

  <!-- Spacer for fixed navbar -->
  <div style="height: var(--header-height);"></div>

  <!-- ===== Sidebar ===== -->
  <nav id="sidebar">
    <div class="sidebar-heading">メニュー</div>
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link" href="index.html">
          <i class="bi bi-people-fill"></i>ユーザーマスタ
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" href="codes.html">
          <i class="bi bi-tags-fill"></i>コードマスタ
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="audit-logs.html">
          <i class="bi bi-journal-text"></i>操作ログ
        </a>
      </li>
    </ul>
  </nav>

  <!-- ===== Main Content ===== -->
  <div id="main-content">

    <!-- Page Header -->
    <div class="page-header">
      <h4><i class="bi bi-tags-fill me-2"></i>コードマスタ</h4>
      <button class="btn btn-primary" id="btnAddCode">
        <i class="bi bi-plus-lg me-1"></i>新規追加
      </button>
    </div>

    <!-- Search Area -->
    <div class="search-area">
      <form>
        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="form-label">コード種別</label>
            <div class="d-flex gap-1">
              <select class="form-select form-select-sm" id="searchCodeTypeId">
                <option value="">すべて</option>
              </select>
              <button type="button" class="btn btn-outline-secondary btn-sm flex-shrink-0" id="btnOpenCodeTypeModal" title="コード種別の管理">
                <i class="bi bi-gear"></i>
              </button>
            </div>
          </div>
          <div class="col-md-3">
            <label class="form-label">コード値</label>
            <input type="text" class="form-control form-control-sm" id="searchValue" placeholder="コード値で検索">
          </div>
          <div class="col-md-3">
            <label class="form-label">コード名</label>
            <input type="text" class="form-control form-control-sm" id="searchName" placeholder="コード名で検索">
          </div>
          <div class="col-md-3">
            <button type="button" class="btn btn-outline-secondary btn-sm me-1" id="btnSearch">
              <i class="bi bi-search me-1"></i>検索
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="btnClear">
              <i class="bi bi-arrow-counterclockwise me-1"></i>クリア
            </button>
          </div>
        </div>
      </form>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-info-bar">
        <span>全 <strong id="totalCount">0</strong> 件</span>
        <span id="showingRange">0 件を表示</span>
      </div>
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th style="width: 120px;">コード種別</th>
              <th style="width: 100px;">コード値</th>
              <th>コード名</th>
              <th style="width: 80px;">表示順</th>
              <th style="width: 80px;">状態</th>
              <th style="width: 130px;">操作</th>
            </tr>
          </thead>
          <tbody id="codeTableBody">
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination-area">
        <nav>
          <ul class="pagination pagination-sm mb-0" id="pagination">
          </ul>
        </nav>
      </div>
    </div>

  </div><!-- /main-content -->

  <!-- ===== Code Edit Modal ===== -->
  <div class="modal fade" id="codeModal" tabindex="-1" aria-labelledby="codeModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="codeModalLabel">
            <i class="bi bi-tag-fill me-2"></i>コード登録・編集
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
        </div>
        <div class="modal-body">
          <form id="codeForm">
            <input type="hidden" id="formMode" value="create">
            <input type="hidden" id="formCodeId" value="">
            <div class="mb-3">
              <label class="form-label required">コード種別</label>
              <div class="d-flex gap-1">
                <select class="form-select" id="formCodeTypeId">
                  <option value="">選択してください</option>
                </select>
                <button type="button" class="btn btn-outline-secondary flex-shrink-0 btn-open-code-type-modal" title="コード種別の管理">
                  <i class="bi bi-gear"></i>
                </button>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label required">コード値</label>
              <input type="text" class="form-control" id="formValue" placeholder="例: DEPT_04">
              <div class="form-text">英数字とアンダースコアのみ使用できます。</div>
            </div>
            <div class="mb-3">
              <label class="form-label required">コード名</label>
              <input type="text" class="form-control" id="formName" placeholder="例: 人事部">
            </div>
            <div class="mb-3">
              <label class="form-label required">表示順</label>
              <input type="number" class="form-control" id="formDisplayOrder" placeholder="例: 4" min="1">
            </div>
            <div class="mb-3">
              <label class="form-label">状態</label>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="formIsActive" checked>
                <label class="form-check-label" for="formIsActive">有効</label>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="bi bi-x-lg me-1"></i>キャンセル
          </button>
          <button type="button" class="btn btn-primary" id="btnSaveCode">
            <i class="bi bi-check-lg me-1"></i>保存
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Delete Confirm Modal ===== -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="deleteModalLabel">
            <i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>削除確認
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
        </div>
        <div class="modal-body">
          <p>このコードを削除してもよろしいですか？</p>
          <p class="text-muted small mb-0">この操作は取り消せません。</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-danger btn-sm" id="btnConfirmDelete">
            <i class="bi bi-trash me-1"></i>削除する
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Code Type Management Modal ===== -->
  <div class="modal fade" id="codeTypeModal" tabindex="-1" aria-labelledby="codeTypeModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="codeTypeModalLabel">
            <i class="bi bi-gear-fill me-2"></i>コード種別の管理
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
        </div>
        <div class="modal-body">
          <!-- 追加/編集フォーム -->
          <div class="d-flex gap-2 mb-3" id="ctFormArea">
            <input type="hidden" id="ctFormId" value="">
            <input type="text" class="form-control form-control-sm" id="ctFormKey" placeholder="種別キー（例: CATEGORY）">
            <input type="text" class="form-control form-control-sm" id="ctFormName" placeholder="表示名（例: カテゴリ）">
            <button type="button" class="btn btn-primary btn-sm flex-shrink-0" id="btnSaveCodeType">
              <i class="bi bi-plus-lg" id="ctBtnIcon"></i>
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm flex-shrink-0 d-none" id="btnCancelEditCodeType">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
          <div id="ctErrorMsg" class="alert alert-danger small py-1 d-none"></div>
          <!-- 一覧 -->
          <table class="table table-sm table-hover mb-0">
            <thead>
              <tr>
                <th>種別キー</th>
                <th>表示名</th>
                <th style="width: 80px;">操作</th>
              </tr>
            </thead>
            <tbody id="codeTypeTableBody">
            </tbody>
          </table>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="bi bi-x-lg me-1"></i>閉じる
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Sidebar Toggle (minimal JS for design) -->
  <script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('main-content').classList.toggle('expanded');
    });
  </script>
  <!-- Auth Script -->
  <script>
    // --- トークン管理 ---
    const token = localStorage.getItem('token');
    if (!token) { location.href = 'login.html'; }

    function parseJwt(t) {
      try {
        const payload = t.split('.')[1];
        const json = atob(payload.replace(/-/g, '+').replace(/_/g, '/'));
        return JSON.parse(json);
      } catch { return null; }
    }

    const claims = parseJwt(token);
    if (!claims) { localStorage.removeItem('token'); location.href = 'login.html'; }

    // ユーザー名表示
    const userName = claims['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name'] || '';
    const userRole = claims['http://schemas.microsoft.com/ws/2008/06/identity/claims/role'] || '';
    document.getElementById('currentUserName').innerHTML =
      '<i class="bi bi-person-circle me-1"></i>' + userName;

    // ログアウト
    document.getElementById('btnLogout').addEventListener('click', function (e) {
      e.preventDefault();
      localStorage.removeItem('token');
      location.href = 'login.html';
    });

    // 認証付き fetch ラッパー
    async function authFetch(url, options = {}) {
      options.headers = options.headers || {};
      options.headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(url, options);
      if (res.status === 401) {
        localStorage.removeItem('token');
        location.href = 'login.html';
      }
      return res;
    }

    // --- ロールベース UI 制御 ---
    (function () {
      if (userRole === 'viewer') {
        document.getElementById('btnAddCode').style.display = 'none';
        // コード種別管理モーダル内のフォームも非表示
        document.getElementById('ctFormArea').style.display = 'none';
      }
    })();
  </script>
  <!-- Code CRUD Script -->
  <script>
    const CODES_API = '/api/codes';
    const CODE_TYPES_API = '/api/code-types';
    let currentPage = 1;
    const pageSize = 10;
    let deleteTargetId = null;
    let codeTypes = []; // キャッシュ

    const codeModal = new bootstrap.Modal(document.getElementById('codeModal'));
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
    const codeTypeModalEl = document.getElementById('codeTypeModal');
    const codeTypeModal = new bootstrap.Modal(codeTypeModalEl);

    // --- コード種別バッジの色 ---
    const badgeColors = ['bg-primary', 'bg-success', 'bg-warning text-dark', 'bg-info text-dark', 'bg-secondary', 'bg-danger'];
    function codeTypeBadge(codeTypeName) {
      const idx = codeTypes.findIndex(ct => ct.name === codeTypeName);
      const color = badgeColors[idx % badgeColors.length] || 'bg-secondary';
      return '<span class="badge ' + color + '">' + codeTypeName + '</span>';
    }

    // --- ステータスバッジ ---
    function statusBadge(isActive) {
      return isActive
        ? '<span class="badge badge-active">有効</span>'
        : '<span class="badge badge-inactive">無効</span>';
    }

    // ========== コード種別 ==========

    async function loadCodeTypes() {
      try {
        const res = await authFetch(CODE_TYPES_API);
        if (!res.ok) throw new Error('コード種別の取得に失敗しました。');
        codeTypes = await res.json();
        renderCodeTypeSelects();
      } catch (e) {
        alert(e.message);
      }
    }

    function renderCodeTypeSelects() {
      const searchSelect = document.getElementById('searchCodeTypeId');
      const formSelect = document.getElementById('formCodeTypeId');

      // 検索フォーム
      const searchVal = searchSelect.value;
      searchSelect.innerHTML = '<option value="">すべて</option>';
      codeTypes.forEach(ct => {
        searchSelect.innerHTML += '<option value="' + ct.id + '">' + ct.name + '</option>';
      });
      searchSelect.value = searchVal;

      // 登録/編集モーダル
      const formVal = formSelect.value;
      formSelect.innerHTML = '<option value="">選択してください</option>';
      codeTypes.forEach(ct => {
        formSelect.innerHTML += '<option value="' + ct.id + '">' + ct.name + '</option>';
      });
      formSelect.value = formVal;
    }

    // --- コード種別モーダル表示時にロード ---
    codeTypeModalEl.addEventListener('show.bs.modal', function () {
      loadCodeTypeTable();
      resetCodeTypeForm();
    });

    async function loadCodeTypeTable() {
      try {
        const res = await authFetch(CODE_TYPES_API);
        if (!res.ok) throw new Error('コード種別の取得に失敗しました。');
        codeTypes = await res.json();
        renderCodeTypeSelects();
        renderCodeTypeTable();
      } catch (e) {
        alert(e.message);
      }
    }

    function renderCodeTypeTable() {
      const tbody = document.getElementById('codeTypeTableBody');
      if (codeTypes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-3">データがありません</td></tr>';
        return;
      }
      tbody.innerHTML = codeTypes.map(ct => {
        let actions = '';
        if (userRole !== 'viewer') {
          actions += `<button class="btn btn-outline-primary btn-action me-1" onclick="editCodeType(${ct.id})"><i class="bi bi-pencil-square"></i></button>`;
          actions += `<button class="btn btn-outline-danger btn-action" onclick="deleteCodeType(${ct.id})"><i class="bi bi-trash"></i></button>`;
        }
        return `<tr>
          <td>${ct.key}</td>
          <td>${ct.name}</td>
          <td>${actions}</td>
        </tr>`;
      }).join('');
    }

    function resetCodeTypeForm() {
      document.getElementById('ctFormId').value = '';
      document.getElementById('ctFormKey').value = '';
      document.getElementById('ctFormName').value = '';
      document.getElementById('ctBtnIcon').className = 'bi bi-plus-lg';
      document.getElementById('btnCancelEditCodeType').classList.add('d-none');
      document.getElementById('ctErrorMsg').classList.add('d-none');
    }

    // --- コード種別の追加/更新 ---
    document.getElementById('btnSaveCodeType').addEventListener('click', async function () {
      const id = document.getElementById('ctFormId').value;
      const key = document.getElementById('ctFormKey').value.trim();
      const name = document.getElementById('ctFormName').value.trim();

      if (!key || !name) {
        showCtError('種別キーと表示名を入力してください。');
        return;
      }

      try {
        let res;
        if (id) {
          res = await authFetch(CODE_TYPES_API + '/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, name }),
          });
        } else {
          res = await authFetch(CODE_TYPES_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, name }),
          });
        }

        if (!res.ok) {
          const err = await res.json().catch(() => null);
          throw new Error(err?.message || err?.title || '保存に失敗しました。');
        }

        resetCodeTypeForm();
        await loadCodeTypeTable();
      } catch (e) {
        showCtError(e.message);
      }
    });

    function showCtError(msg) {
      const el = document.getElementById('ctErrorMsg');
      el.textContent = msg;
      el.classList.remove('d-none');
    }

    // --- コード種別の編集 ---
    function editCodeType(id) {
      const ct = codeTypes.find(c => c.id === id);
      if (!ct) return;
      document.getElementById('ctFormId').value = ct.id;
      document.getElementById('ctFormKey').value = ct.key;
      document.getElementById('ctFormName').value = ct.name;
      document.getElementById('ctBtnIcon').className = 'bi bi-check-lg';
      document.getElementById('btnCancelEditCodeType').classList.remove('d-none');
      document.getElementById('ctErrorMsg').classList.add('d-none');
    }

    document.getElementById('btnCancelEditCodeType').addEventListener('click', function () {
      resetCodeTypeForm();
    });

    // --- コード種別の削除 ---
    async function deleteCodeType(id) {
      if (!confirm('このコード種別を削除してもよろしいですか？')) return;
      try {
        const res = await authFetch(CODE_TYPES_API + '/' + id, { method: 'DELETE' });
        if (res.status === 409) {
          const err = await res.json().catch(() => null);
          showCtError(err?.message || 'このコード種別は使用中のため削除できません。');
          return;
        }
        if (!res.ok) throw new Error('削除に失敗しました。');
        await loadCodeTypeTable();
      } catch (e) {
        showCtError(e.message);
      }
    }

    // --- コード種別モーダルを開くボタン（複数箇所） ---
    document.getElementById('btnOpenCodeTypeModal').addEventListener('click', function () {
      codeTypeModal.show();
    });
    document.querySelectorAll('.btn-open-code-type-modal').forEach(btn => {
      btn.addEventListener('click', function () {
        codeTypeModal.show();
      });
    });

    // ========== コード ==========

    async function loadCodes(page) {
      currentPage = page || 1;
      const params = new URLSearchParams();
      const codeTypeId = document.getElementById('searchCodeTypeId').value;
      const value = document.getElementById('searchValue').value.trim();
      const name = document.getElementById('searchName').value.trim();

      if (codeTypeId) params.set('codeTypeId', codeTypeId);
      if (value) params.set('value', value);
      if (name) params.set('name', name);
      params.set('page', currentPage);
      params.set('pageSize', pageSize);

      try {
        const res = await authFetch(CODES_API + '?' + params.toString());
        if (!res.ok) throw new Error('データの取得に失敗しました。');
        const data = await res.json();
        renderTable(data);
        renderPagination(data);
        renderInfoBar(data);
      } catch (e) {
        alert(e.message);
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('codeTableBody');
      if (data.items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">データがありません</td></tr>';
        return;
      }
      tbody.innerHTML = data.items.map(c => {
        let actions = '';
        if (userRole !== 'viewer') {
          actions += `<button class="btn btn-outline-primary btn-action me-1" onclick="openEditModal(${c.id})"><i class="bi bi-pencil-square"></i></button>`;
          actions += `<button class="btn btn-outline-danger btn-action" onclick="openDeleteModal(${c.id})"><i class="bi bi-trash"></i></button>`;
        }
        return `<tr>
          <td>${codeTypeBadge(c.codeTypeName)}</td>
          <td>${c.value}</td>
          <td>${c.name}</td>
          <td class="text-center">${c.displayOrder}</td>
          <td>${statusBadge(c.isActive)}</td>
          <td>${actions}</td>
        </tr>`;
      }).join('');
    }

    function renderInfoBar(data) {
      document.getElementById('totalCount').textContent = data.totalCount;
      const start = (data.page - 1) * data.pageSize + 1;
      const end = Math.min(data.page * data.pageSize, data.totalCount);
      document.getElementById('showingRange').textContent =
        data.totalCount > 0 ? start + ' - ' + end + ' 件を表示' : '0 件を表示';
    }

    function renderPagination(data) {
      const totalPages = Math.ceil(data.totalCount / data.pageSize);
      const ul = document.getElementById('pagination');
      if (totalPages <= 1) { ul.innerHTML = ''; return; }

      let html = '';
      html += '<li class="page-item ' + (data.page <= 1 ? 'disabled' : '') + '">';
      html += '<a class="page-link" href="#" onclick="loadCodes(' + (data.page - 1) + '); return false;"><i class="bi bi-chevron-left"></i></a></li>';

      for (let i = 1; i <= totalPages; i++) {
        html += '<li class="page-item ' + (i === data.page ? 'active' : '') + '">';
        html += '<a class="page-link" href="#" onclick="loadCodes(' + i + '); return false;">' + i + '</a></li>';
      }

      html += '<li class="page-item ' + (data.page >= totalPages ? 'disabled' : '') + '">';
      html += '<a class="page-link" href="#" onclick="loadCodes(' + (data.page + 1) + '); return false;"><i class="bi bi-chevron-right"></i></a></li>';

      ul.innerHTML = html;
    }

    // --- 新規追加モーダル ---
    document.getElementById('btnAddCode').addEventListener('click', function () {
      document.getElementById('formMode').value = 'create';
      document.getElementById('formCodeId').value = '';
      document.getElementById('codeModalLabel').innerHTML = '<i class="bi bi-tag-fill me-2"></i>コード登録';
      document.getElementById('formCodeTypeId').value = '';
      document.getElementById('formValue').value = '';
      document.getElementById('formName').value = '';
      document.getElementById('formDisplayOrder').value = '';
      document.getElementById('formIsActive').checked = true;
      codeModal.show();
    });

    // --- 編集モーダル ---
    async function openEditModal(id) {
      try {
        const res = await authFetch(CODES_API + '/' + id);
        if (!res.ok) throw new Error('コード情報の取得に失敗しました。');
        const code = await res.json();

        document.getElementById('formMode').value = 'edit';
        document.getElementById('formCodeId').value = code.id;
        document.getElementById('codeModalLabel').innerHTML = '<i class="bi bi-pencil-square me-2"></i>コード編集';
        document.getElementById('formCodeTypeId').value = code.codeTypeId;
        document.getElementById('formValue').value = code.value;
        document.getElementById('formName').value = code.name;
        document.getElementById('formDisplayOrder').value = code.displayOrder;
        document.getElementById('formIsActive').checked = code.isActive;
        codeModal.show();
      } catch (e) {
        alert(e.message);
      }
    }

    // --- 保存 ---
    document.getElementById('btnSaveCode').addEventListener('click', async function () {
      const mode = document.getElementById('formMode').value;
      const id = document.getElementById('formCodeId').value;
      const codeTypeId = parseInt(document.getElementById('formCodeTypeId').value);
      const value = document.getElementById('formValue').value.trim();
      const name = document.getElementById('formName').value.trim();
      const displayOrder = parseInt(document.getElementById('formDisplayOrder').value);
      const isActive = document.getElementById('formIsActive').checked;

      try {
        let res;
        if (mode === 'create') {
          res = await authFetch(CODES_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ codeTypeId, value, name, displayOrder, isActive }),
          });
        } else {
          res = await authFetch(CODES_API + '/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ codeTypeId, value, name, displayOrder, isActive }),
          });
        }

        if (!res.ok) {
          const err = await res.json().catch(() => null);
          throw new Error(err?.message || err?.title || '保存に失敗しました。');
        }

        codeModal.hide();
        loadCodes(mode === 'create' ? 1 : currentPage);
      } catch (e) {
        alert(e.message);
      }
    });

    // --- 削除確認モーダル ---
    function openDeleteModal(id) {
      deleteTargetId = id;
      deleteModal.show();
    }

    document.getElementById('btnConfirmDelete').addEventListener('click', async function () {
      if (!deleteTargetId) return;
      try {
        const res = await authFetch(CODES_API + '/' + deleteTargetId, { method: 'DELETE' });
        if (!res.ok) throw new Error('削除に失敗しました。');
        deleteModal.hide();
        loadCodes(currentPage);
      } catch (e) {
        alert(e.message);
      }
    });

    // --- 検索・クリア ---
    document.getElementById('btnSearch').addEventListener('click', function () {
      loadCodes(1);
    });

    document.getElementById('btnClear').addEventListener('click', function () {
      document.getElementById('searchCodeTypeId').value = '';
      document.getElementById('searchValue').value = '';
      document.getElementById('searchName').value = '';
      loadCodes(1);
    });

    // --- 初期ロード ---
    (async function () {
      await loadCodeTypes();
      loadCodes(1);
    })();
  </script>
</body>
</html>
