<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マスタメンテナンス - ログイン</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      font-family: "Segoe UI", "Meiryo", sans-serif;
      background-color: #f5f6fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .login-header h4 {
      font-weight: 600;
      color: #2c3e50;
    }
    .login-header p {
      color: #6c757d;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="login-header">
          <h4><i class="bi bi-gear-fill me-2"></i>マスタメンテナンス</h4>
          <p>ログインしてください</p>
        </div>

        <div id="errorAlert" class="alert alert-danger small py-2 d-none"></div>

        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label fw-medium">メールアドレス</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="email" placeholder="example@example.com" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium">パスワード</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" placeholder="パスワードを入力" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="btnLogin">
            <i class="bi bi-box-arrow-in-right me-1"></i>ログイン
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 既にトークンがあればリダイレクト
    if (localStorage.getItem('token')) {
      location.href = 'index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const errorAlert = document.getElementById('errorAlert');
      errorAlert.classList.add('d-none');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        if (!res.ok) {
          if (res.status === 401) {
            throw new Error('メールアドレスまたはパスワードが正しくありません。');
          }
          throw new Error('ログインに失敗しました。');
        }

        const data = await res.json();
        localStorage.setItem('token', data.token);
        location.href = 'index.html';
      } catch (e) {
        errorAlert.textContent = e.message;
        errorAlert.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
