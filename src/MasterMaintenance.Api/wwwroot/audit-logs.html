<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マスタメンテナンス - 操作ログ</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- ===== Header ===== -->
  <nav class="navbar navbar-expand navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <button class="btn btn-dark me-2" id="sidebarToggle">
        <i class="bi bi-list"></i>
      </button>
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-gear-fill me-1"></i>マスタメンテナンス
      </a>
      <div class="ms-auto d-flex align-items-center">
        <span class="text-light small me-2" id="currentUserName">
          <i class="bi bi-person-circle me-1"></i>
        </span>
        <a href="#" class="btn btn-outline-light btn-sm" id="btnLogout">
          <i class="bi bi-box-arrow-right"></i> ログアウト
        </a>
      </div>
    </div>
  </nav>

  <!-- Spacer for fixed navbar -->
  <div style="height: var(--header-height);"></div>

  <!-- ===== Sidebar ===== -->
  <nav id="sidebar">
    <div class="sidebar-heading">メニュー</div>
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link" href="index.html">
          <i class="bi bi-people-fill"></i>ユーザーマスタ
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="codes.html">
          <i class="bi bi-tags-fill"></i>コードマスタ
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" href="audit-logs.html">
          <i class="bi bi-journal-text"></i>操作ログ
        </a>
      </li>
    </ul>
  </nav>

  <!-- ===== Main Content ===== -->
  <div id="main-content">

    <!-- Page Header -->
    <div class="page-header">
      <h4><i class="bi bi-journal-text me-2"></i>操作ログ</h4>
      <button class="btn btn-outline-primary" id="exportBtn">
        <i class="bi bi-download me-1"></i>ログ出力
      </button>
    </div>

    <!-- Search Area -->
    <div class="search-area">
      <form>
        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="form-label">期間（開始）</label>
            <input type="date" class="form-control form-control-sm" id="searchFrom">
          </div>
          <div class="col-md-3">
            <label class="form-label">期間（終了）</label>
            <input type="date" class="form-control form-control-sm" id="searchTo">
          </div>
          <div class="col-md-2">
            <label class="form-label">操作種別</label>
            <select class="form-select form-select-sm" id="searchAction">
              <option value="">すべて</option>
              <option value="Create">作成</option>
              <option value="Update">更新</option>
              <option value="Delete">削除</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">対象テーブル</label>
            <select class="form-select form-select-sm" id="searchTable">
              <option value="">すべて</option>
              <option value="Users">ユーザー</option>
              <option value="CodeTypes">コード種別</option>
              <option value="Codes">コード</option>
            </select>
          </div>
          <div class="col-md-2">
            <button type="button" class="btn btn-outline-secondary btn-sm me-1" id="btnSearch">
              <i class="bi bi-search me-1"></i>検索
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="btnClear">
              <i class="bi bi-arrow-counterclockwise me-1"></i>クリア
            </button>
          </div>
        </div>
      </form>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-info-bar">
        <span>全 <strong id="totalCount">0</strong> 件</span>
        <span id="rangeInfo">0 - 0 件を表示</span>
      </div>
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th style="width: 160px;">日時</th>
              <th style="width: 120px;">操作者</th>
              <th style="width: 80px;">操作</th>
              <th style="width: 120px;">対象</th>
              <th style="width: 100px;">レコードID</th>
              <th>変更内容</th>
            </tr>
          </thead>
          <tbody id="logTableBody">
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination-area">
        <nav>
          <ul class="pagination pagination-sm mb-0" id="pagination">
          </ul>
        </nav>
      </div>
    </div>

  </div><!-- /main-content -->

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Auth Script -->
  <script>
    // --- トークン管理 ---
    const token = localStorage.getItem('token');
    if (!token) { location.href = 'login.html'; }

    function parseJwt(t) {
      try {
        const payload = t.split('.')[1];
        const json = atob(payload.replace(/-/g, '+').replace(/_/g, '/'));
        return JSON.parse(json);
      } catch { return null; }
    }

    const claims = parseJwt(token);
    if (!claims) { localStorage.removeItem('token'); location.href = 'login.html'; }

    // ユーザー名表示
    const userName = claims['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name'] || '';
    const userRole = claims['http://schemas.microsoft.com/ws/2008/06/identity/claims/role'] || '';
    document.getElementById('currentUserName').innerHTML =
      '<i class="bi bi-person-circle me-1"></i>' + userName;

    // ログアウト
    document.getElementById('btnLogout').addEventListener('click', function (e) {
      e.preventDefault();
      localStorage.removeItem('token');
      location.href = 'login.html';
    });

    // 認証付き fetch ラッパー
    async function authFetch(url, options = {}) {
      options.headers = options.headers || {};
      options.headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(url, options);
      if (res.status === 401) {
        localStorage.removeItem('token');
        location.href = 'login.html';
      }
      return res;
    }

    // --- 操作ログ機能 ---
    const API_BASE = '/api/audit-logs';
    const PAGE_SIZE = 20;
    let currentPage = 1;

    const actionLabels = { Create: '作成', Update: '更新', Delete: '削除' };
    const actionBadges = {
      Create: '<span class="badge bg-success">作成</span>',
      Update: '<span class="badge bg-warning text-dark">更新</span>',
      Delete: '<span class="badge bg-danger">削除</span>',
    };
    const tableLabels = { Users: 'ユーザー', CodeTypes: 'コード種別', Codes: 'コード' };

    function formatDateTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function loadLogs(page) {
      currentPage = page || 1;
      const params = new URLSearchParams();
      params.set('page', currentPage);
      params.set('pageSize', PAGE_SIZE);

      const from = document.getElementById('searchFrom').value;
      const to = document.getElementById('searchTo').value;
      const action = document.getElementById('searchAction').value;
      const tableName = document.getElementById('searchTable').value;

      if (from) params.set('from', from);
      if (to) params.set('to', to);
      if (action) params.set('action', action);
      if (tableName) params.set('tableName', tableName);

      const res = await authFetch(`${API_BASE}?${params}`);
      if (res.status === 403) {
        document.getElementById('logTableBody').innerHTML =
          '<tr><td colspan="6" class="text-center text-danger">アクセス権限がありません。管理者のみ閲覧可能です。</td></tr>';
        document.getElementById('totalCount').textContent = '0';
        document.getElementById('rangeInfo').textContent = '0 - 0 件を表示';
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      if (!res.ok) {
        document.getElementById('logTableBody').innerHTML =
          '<tr><td colspan="6" class="text-center text-danger">データの取得に失敗しました。</td></tr>';
        return;
      }

      const data = await res.json();
      renderTable(data);
      renderPagination(data);
    }

    function renderTable(data) {
      const tbody = document.getElementById('logTableBody');
      document.getElementById('totalCount').textContent = data.totalCount;

      const start = (data.page - 1) * data.pageSize + 1;
      const end = Math.min(data.page * data.pageSize, data.totalCount);
      document.getElementById('rangeInfo').textContent =
        data.totalCount > 0 ? `${start} - ${end} 件を表示` : '0 - 0 件を表示';

      if (data.items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">データがありません</td></tr>';
        return;
      }

      tbody.innerHTML = data.items.map(log => `
        <tr>
          <td>${formatDateTime(log.createdAt)}</td>
          <td>${escapeHtml(log.userId)}</td>
          <td>${actionBadges[log.action] || escapeHtml(log.action)}</td>
          <td>${tableLabels[log.tableName] || escapeHtml(log.tableName)}</td>
          <td>${escapeHtml(log.recordId)}</td>
          <td class="text-muted small">${escapeHtml(log.changes)}</td>
        </tr>
      `).join('');
    }

    function renderPagination(data) {
      const totalPages = Math.ceil(data.totalCount / data.pageSize);
      const ul = document.getElementById('pagination');

      if (totalPages <= 1) { ul.innerHTML = ''; return; }

      let html = '';
      html += `<li class="page-item ${data.page <= 1 ? 'disabled' : ''}">
        <a class="page-link" href="#" data-page="${data.page - 1}"><i class="bi bi-chevron-left"></i></a></li>`;

      for (let i = 1; i <= totalPages; i++) {
        html += `<li class="page-item ${i === data.page ? 'active' : ''}">
          <a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
      }

      html += `<li class="page-item ${data.page >= totalPages ? 'disabled' : ''}">
        <a class="page-link" href="#" data-page="${data.page + 1}"><i class="bi bi-chevron-right"></i></a></li>`;

      ul.innerHTML = html;
      ul.querySelectorAll('a[data-page]').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          const p = parseInt(a.dataset.page);
          if (p >= 1 && p <= totalPages) loadLogs(p);
        });
      });
    }

    // 検索
    document.getElementById('btnSearch').addEventListener('click', () => loadLogs(1));

    // クリア
    document.getElementById('btnClear').addEventListener('click', () => {
      document.getElementById('searchFrom').value = '';
      document.getElementById('searchTo').value = '';
      document.getElementById('searchAction').value = '';
      document.getElementById('searchTable').value = '';
      loadLogs(1);
    });

    // エクスポート
    document.getElementById('exportBtn').addEventListener('click', async () => {
      const params = new URLSearchParams();
      const from = document.getElementById('searchFrom').value;
      const to = document.getElementById('searchTo').value;
      if (from) params.set('from', from);
      if (to) params.set('to', to);

      const res = await authFetch(`${API_BASE}/export?${params}`);
      if (res.status === 403) {
        alert('アクセス権限がありません。');
        return;
      }
      if (!res.ok) {
        alert('エクスポートに失敗しました。');
        return;
      }

      const blob = await res.blob();
      const disposition = res.headers.get('content-disposition') || '';
      let fileName = 'audit-log.log';
      const match = disposition.match(/filename\*?=(?:UTF-8'')?([^;\s]+)/i);
      if (match) fileName = decodeURIComponent(match[1].replace(/"/g, ''));

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // 初期読み込み
    loadLogs(1);
  </script>
  <!-- Sidebar Toggle -->
  <script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('main-content').classList.toggle('expanded');
    });
  </script>
</body>
</html>
